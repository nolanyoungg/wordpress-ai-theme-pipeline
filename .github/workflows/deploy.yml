name: Deploy Theme Preview to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "preview/**"
      - "wp-content/themes/nolan-showcase-theme/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-preview
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy static theme preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate preview files
        run: |
          set -e

          if [ ! -f preview/index.html ]; then
            echo "::error::Missing preview/index.html. Run the AI Development Pipeline and merge the generated theme PR first."
            exit 1
          fi

          if [ ! -f preview/assets/css/preview.css ]; then
            echo "::error::Missing preview/assets/css/preview.css."
            exit 1
          fi

          if [ ! -f preview/assets/js/preview.js ]; then
            echo "::error::Missing preview/assets/js/preview.js."
            exit 1
          fi

          touch preview/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload preview artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview

      - name: Deploy preview to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
