name: AI Development Pipeline

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Describe the WordPress/theme task for the AI pipeline."
        required: true
        type: string
      base_branch:
        description: "Branch to build from."
        required: true
        default: "main"
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  checks: read

jobs:
  ai-development:
    name: Plan, build, verify, review, and open PR
    runs-on: ubuntu-latest

    env:
      TASK: ${{ inputs.task }}
      BASE_BRANCH: ${{ inputs.base_branch }}
      BRANCH_NAME: ai/wordpress-theme-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BASE_BRANCH }}
          fetch-depth: 0

      - name: Prepare AI artifact directory
        run: mkdir -p .ai

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Set up Node if package.json exists
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies if present
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Planner Agent
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          output-file: .ai/builder-prompt.md
          prompt: |
            You are the PLANNER AGENT.

            Convert the user's request into a precise implementation prompt
            for a separate Builder Agent.

            User request:
            ${{ env.TASK }}

            Repository instructions:
            - Read AGENTS.md.
            - The target theme directory is wp-content/themes/nolan-showcase-theme/.
            - The result should be suitable for a WordPress theme pull request.
            - Do not edit unrelated files.

            Output only the Builder Agent prompt.

            The Builder Agent prompt must include:
            1. Goal
            2. Theme type and structure
            3. Exact files/folders to create or update
            4. Design requirements
            5. WordPress requirements
            6. Accessibility requirements
            7. Security requirements
            8. Verification commands
            9. Definition of done
            10. Explicit instruction to summarize every changed file

      - name: Builder Agent
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          prompt-file: .ai/builder-prompt.md
          output-file: .ai/implementation-summary.md

      - name: Verification
        id: verify
        shell: bash
        run: |
          set +e

          echo "# Verification Report" > .ai/verification-report.md
          echo "" >> .ai/verification-report.md

          THEME_DIR="wp-content/themes/nolan-showcase-theme"

          echo "## Theme directory check" >> .ai/verification-report.md

          if [ -d "$THEME_DIR" ]; then
            echo "Theme directory exists: $THEME_DIR" >> .ai/verification-report.md
          else
            echo "ERROR: Theme directory does not exist: $THEME_DIR" >> .ai/verification-report.md
            exit 1
          fi

          echo "" >> .ai/verification-report.md
          echo "## Required WordPress theme files" >> .ai/verification-report.md

          REQUIRED_FILES=(
            "$THEME_DIR/style.css"
            "$THEME_DIR/functions.php"
          )

          for REQUIRED_FILE in "${REQUIRED_FILES[@]}"; do
            if [ -f "$REQUIRED_FILE" ]; then
              echo "Found: $REQUIRED_FILE" >> .ai/verification-report.md
            else
              echo "ERROR: Missing required file: $REQUIRED_FILE" >> .ai/verification-report.md
              exit 1
            fi
          done

          echo "" >> .ai/verification-report.md
          echo "## WordPress theme header check" >> .ai/verification-report.md

          if grep -q "Theme Name:" "$THEME_DIR/style.css"; then
            echo "Theme header found in style.css." >> .ai/verification-report.md
          else
            echo "ERROR: Missing Theme Name header in style.css." >> .ai/verification-report.md
            exit 1
          fi

          echo "" >> .ai/verification-report.md
          echo "## PHP syntax check" >> .ai/verification-report.md

          PHP_FAILURES=0

          while IFS= read -r PHP_FILE; do
            echo "Checking $PHP_FILE" >> .ai/verification-report.md
            php -l "$PHP_FILE" >> .ai/verification-report.md 2>&1

            if [ $? -ne 0 ]; then
              PHP_FAILURES=$((PHP_FAILURES + 1))
            fi
          done < <(find "$THEME_DIR" -name "*.php" -type f)

          if [ "$PHP_FAILURES" -ne 0 ]; then
            echo "ERROR: PHP syntax check failed." >> .ai/verification-report.md
            exit 1
          fi

          echo "" >> .ai/verification-report.md
          echo "## Optional npm checks" >> .ai/verification-report.md

          if [ -f package.json ]; then
            if npm run | grep -q " lint"; then
              npm run lint >> .ai/verification-report.md 2>&1
              if [ $? -ne 0 ]; then exit 1; fi
            fi

            if npm run | grep -q " build"; then
              npm run build >> .ai/verification-report.md 2>&1
              if [ $? -ne 0 ]; then exit 1; fi
            fi

            if npm run | grep -q " test"; then
              npm test >> .ai/verification-report.md 2>&1
              if [ $? -ne 0 ]; then exit 1; fi
            fi
          else
            echo "No package.json found. Skipping npm checks." >> .ai/verification-report.md
          fi

          echo "" >> .ai/verification-report.md
          echo "Verification complete." >> .ai/verification-report.md

      - name: Reviewer Agent
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          safety-strategy: drop-sudo
          output-file: .ai/reviewer-report.md
          prompt: |
            You are the REVIEWER AGENT.

            Review the current working tree diff against ${{ env.BASE_BRANCH }}.

            Original user task:
            ${{ env.TASK }}

            Read these files:
            - AGENTS.md
            - .ai/builder-prompt.md
            - .ai/implementation-summary.md
            - .ai/verification-report.md

            Focus on:
            1. WordPress compatibility
            2. PHP correctness
            3. Security and escaping
            4. Accessibility
            5. Performance
            6. Broken paths or missing assets
            7. Unrelated changes
            8. Whether this is safe to review as a PR

            Output:
            1. Recommendation: APPROVE, APPROVE WITH NOTES, or BLOCK
            2. Critical issues
            3. Non-critical issues
            4. Verification summary
            5. Files changed
            6. Manual review checklist
            7. Suggested next task

      - name: Build pull request body
        shell: bash
        run: |
          {
            echo "# AI WordPress Theme Pipeline"
            echo ""
            echo "## Original task"
            echo ""
            echo "$TASK"
            echo ""
            echo "## Planner output / Builder prompt"
            echo ""
            cat .ai/builder-prompt.md
            echo ""
            echo "## Builder implementation summary"
            echo ""
            cat .ai/implementation-summary.md
            echo ""
            echo "## Verification report"
            echo ""
            cat .ai/verification-report.md
            echo ""
            echo "## Reviewer report"
            echo ""
            cat .ai/reviewer-report.md
          } > .ai/pr-body.md

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -e

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes were produced by the AI pipeline."
            exit 0
          fi

          git config user.name "codex-ai-pipeline"
          git config user.email "codex-ai-pipeline@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "AI pipeline: build WordPress theme"
          git push --set-upstream origin "$BRANCH_NAME"

          FIRST_TASK_LINE="${TASK%%$'\n'*}"
          if [ -z "$FIRST_TASK_LINE" ]; then
            FIRST_TASK_LINE="WordPress theme update"
          fi

          PR_TITLE=$(printf "AI pipeline: %.80s" "$FIRST_TASK_LINE")

          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "$PR_TITLE" \
            --body-file .ai/pr-body.md
