<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Project placeholder: Backyard Stripe Set</title>
  <desc id="desc">Abstract stripes and curves in emerald and lime.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06120b"/>
      <stop offset="1" stop-color="#040b07"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0aa66a" stop-opacity=".75"/>
      <stop offset="1" stop-color="#19d38d" stop-opacity=".25"/>
