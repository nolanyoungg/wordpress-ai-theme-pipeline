<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Premium lawn and landscaping illustration</title>
  <desc id="desc">Abstract dark landscape with emerald gradients, lime accents, and clean geometric shapes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06120b"/>
      <stop offset="1" stop-color="#031008"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="10%" r="70%">
      <stop offset="0" stop-color="#19d38d" stop-opacity=".55"/>
      <stop offset=".55" stop-color="#19d38d" stop-opacity=".08"/>
      <stop offset="1" stop-color="#19d38d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0aa66a" stop-opacity=".85"/>
      <stop offset="1" stop-color="#19d38d" stop-opacity=".35"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7ff75"/>
      <stop offset="1" stop-color="#b6ff3b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <rect width="1200" height="800" fill="url(#glow)"/>

  <g opacity=".9">
    <path d="M0 590 C180 520 320 520 470 560 C610 598 760 618 930 582 C1030 560 1120 520 1200 520 L1200 800 L0 800 Z" fill="url(#hill)"/>
    <path d="M0 650 C220 610 360 630 520 675 C690 722 860 720 1040 660 C1120 632 1160 610 1200 590 L1200 800 L0 800 Z" fill="#063319" opacity=".55"/>
  </g>

  <g>
    <path d="M180 520 C260 455 360 430 470 445 C610 465 705 438 820 395 C900 364 980 325 1060 300" fill="none" stroke="#b6ff3b" stroke-opacity=".45" stroke-width="6" stroke-linecap="round"/>
    <path d="M210 560 C310 500 430 480 560 505 C700 533 820 520 980 455" fill="none" stroke="#19d38d" stroke-opacity=".45" stroke-width="6" stroke-linecap="round"/>
  </g>

  <g filter="url(#soft)" opacity=".55">
    <circle cx="960" cy="210" r="90" fill="#b6ff3b"/>
    <circle cx="340" cy="220" r="120" fill="#19d38d"/>
  </g>

  <g opacity=".95">
    <rect x="130" y="120" width="420" height="240" rx="26" fill="rgba(12,22,16,.65)" stroke="rgba(180,255,210,.22)" stroke-width="2"/>
    <path d="M180 300 C240 250 320 250 380 300 C440 350 520 350 580 300" fill="none" stroke="url(#lime)" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 250 C260 210 340 210 420 250" fill="none" stroke="#19d38d" stroke-opacity=".7" stroke-width="8" stroke-linecap="round"/>
    <circle cx="190" cy="168" r="8" fill="#d7ff75"/>
    <circle cx="520" cy="168" r="8" fill="#19d38d"/>
    <circle cx="420" cy="336" r="8" fill="#b6ff3b"/>
  </g>

  <g opacity=".9">
    <path d="M790 540 L890 420 L1040 540 Z" fill="rgba(10,18,14,.52)" stroke="rgba(180,255,210,.20)" stroke-width="2"/>
    <path d="M880 500 L915 430" stroke="#b6ff3b" stroke-opacity=".55" stroke-width="6" stroke-linecap="round"/>
    <circle cx="915" cy="430" r="12" fill="#19d38d" opacity=".9"/>
  </g>
</svg>

