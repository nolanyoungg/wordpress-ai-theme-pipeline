  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <rect x="56" y="56" width="848" height="488" rx="28" fill="rgba(12,22,16,.62)" stroke="rgba(180,255,210,.18)" stroke-width="3"/>
  <g opacity=".95">
    <path d="M130 470 C260 420 330 420 450 470 C570 520 680 520 820 460" fill="none" stroke="#b6ff3b" stroke-opacity=".55" stroke-width="10" stroke-linecap="round"/>
    <path d="M160 200 H820" stroke="url(#stripe)" stroke-width="18" stroke-linecap="round"/>
    <path d="M160 260 H820" stroke="url(#stripe)" stroke-width="18" stroke-linecap="round" opacity=".8"/>
    <path d="M160 320 H820" stroke="url(#stripe)" stroke-width="18" stroke-linecap="round" opacity=".6"/>
  </g>
  <circle cx="240" cy="210" r="10" fill="#d7ff75"/>
  <circle cx="720" cy="330" r="10" fill="#19d38d"/>
